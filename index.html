<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mistaben Collections</title>
    <meta name="description" content="Premium fashion collections — explore curated clothing, accessories and more. Shop Mistaben Collections today." />
    <meta name="keywords" content="Mistaben, fashion, collections, clothing, accessories, online store" />
    <meta name="author" content="Mistaben Collections" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mistaben.onspace.app" />
    <meta property="og:title" content="Mistaben Collections" />
    <meta property="og:description" content="Premium fashion collections — explore curated clothing, accessories and more." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Mistaben Collections" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mistaben Collections" />
    <meta name="twitter:description" content="Premium fashion collections — explore curated clothing, accessories and more." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- PWA (Admin) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MB Admin" />
    <meta name="theme-color" content="#b91c1c" />
    <link rel="apple-touch-icon" href="/admin-icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mistaben Collections",
      "url": "https://mistaben.onspace.app",
      "description": "Premium fashion collections"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register service worker only for /admin scope -->
    <script>
      if ('serviceWorker' in navigator && window.location.pathname.startsWith('/admin')) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/admin' })
            .then(function (reg) { console.log('[SW] Admin SW registered, scope:', reg.scope); })
            .catch(function (err) { console.warn('[SW] Registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
